<svg viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="caltos-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e676" />
      <stop offset="100%" stop-color="#1db954" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <style>
      .text { font-family: 'Inter', -apple-system, sans-serif; font-size: 80px; font-weight: 800; fill: #ffffff; letter-spacing: -2px; }
    </style>
  </defs>
  
  <g transform="translate(20, 0)">
    <!-- Icon -->
    <path d="M 140 50 A 60 60 0 1 0 140 150" fill="none" stroke="url(#caltos-grad)" stroke-width="24" stroke-linecap="round" filter="url(#glow)"/>
    <circle cx="120" cy="100" r="14" fill="#00e676" filter="url(#glow)"/>
    
    <!-- Text -->
    <text x="180" y="125" class="text">Caltos</text>
  </g>
</svg>
